      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                type: object
                x-inferred: true
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
