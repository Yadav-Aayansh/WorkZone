openapi: 3.1.0
info:
  title: WorkZone API
  version: ca2ba82
  description: "\nWorkZone API - A comprehensive platform for managing recruitment, job applications, \nand tenant-based workforce\
    \ management.\n\n## Features\n- Multi-tenant architecture with subdomain-based routing\n- Role-based access control (Recruiter,\
    \ Manager, Employee, Applicant)\n- AI-powered job description enhancement\n- AI interview automation via WebSocket\n-\
    \ Subscription management with Razorpay integration\n\n## Authentication\nMost endpoints require JWT bearer token authentication\
    \ obtained from login/signup endpoints.\n"
  contact:
    name: WorkZone Team
    url: https://github.com/Yadav-Aayansh/soft-engg-project-sep-2025-se-SEP-10
  x-generated-by: github-copilot
  x-generated-at: '2025-11-15T18:54:58.955918+00:00'
servers:
- url: http://localhost:8000
  description: Local development
- url: https://api.workzone.tech
  description: Production (placeholder)
tags:
- name: Client Auth
  description: Client authentication endpoints
- name: Client
  description: Client management and onboarding
- name: Tenant Auth
  description: Tenant user authentication
- name: Tenant Job
  description: Job posting management
- name: Tenant Application
  description: Application management
- name: Tenant Recruiter
  description: Recruiter operations
- name: Tenant Manager
  description: Manager operations
- name: Tenant Employee
  description: Employee operations
- name: Tenant Applicant
  description: Applicant operations
- name: Tenant AI Interview
  description: AI interview sessions
- name: Configuration
  description: Tenant configuration
paths:
  /api/platform/auth/signup:
    post:
      operationId: platformAuthSignup
      tags:
      - Client Auth
      summary: Register new client
      description: 'User story: As a new organization, I want to register so that I can use the platform.


        Creates a new client account with JWT tokens.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientSignupRequest'
            examples:
              example1:
                value:
                  name: Acme Corp
                  email: admin@acme.com
                  password: SecurePass123!
      responses:
        '201':
          description: Client registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSignupResponse'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/platform/auth/login:
    post:
      operationId: platformAuthLogin
      tags:
      - Client Auth
      summary: Client login
      description: 'User story: As a client, I want to log in to access my workspace.


        Authenticates client and returns JWT tokens.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientLoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/platform/auth/refresh:
    post:
      operationId: platformAuthRefresh
      tags:
      - Client Auth
      summary: Refresh access token
      description: 'User story: As a client, I want to refresh my token to maintain my session.


        Generates new access token from refresh token.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientLoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/platform/onboarding:
    post:
      operationId: platformOnboarding
      tags:
      - Client
      summary: Complete client onboarding
      description: 'User story: As a new client, I want to onboard my organization to set up my workspace.


        Completes onboarding with tenant info and logo upload.'
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - tenant_id
              - brand_name
              - logo
              properties:
                tenant_id:
                  type: string
                  maxLength: 50
                brand_name:
                  type: string
                  maxLength: 100
                logo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Onboarding completed
          content:
            application/json:
              schema:
                type: object
                x-inferred: true
                properties:
                  message:
                    type: string
                  tenant_id:
                    type: string
        '409':
          $ref: '#/components/responses/ConflictError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/platform/tenant-availability:
