components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from login/signup
  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
      description: Tenant identifier
      example: acme-corp
  schemas:
    Error:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid input
        details:
          type: object
          additionalProperties: true
    ClientSignupRequest:
      type: object
      required:
      - name
      - email
      - password
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: Acme Corp
        email:
          type: string
          format: email
          maxLength: 255
          example: admin@acme.com
        password:
          type: string
          minLength: 8
          example: SecurePass123!
    ClientSignupResponse:
      type: object
      required:
      - access_token
      - refresh_token
      - account_status
      - subscription_status
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        account_status:
          type: string
          example: active
        subscription_status:
          type: string
          example: trial
    ClientLoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
    ClientLoginResponse:
      type: object
      required:
      - access_token
      - refresh_token
      - account_status
      - subscription_status
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        account_status:
          type: string
        subscription_status:
          type: string
    ClientRefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    UserSignupRequest:
      type: object
      required:
      - name
      - email
      - password
      - role
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
    UserSignupInvitedRequest:
      type: object
      required:
      - token
      - password
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
    UserSignupResponse:
      type: object
      required:
      - access_token
      - refresh_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    UserLoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
    UserLoginResponse:
      type: object
      required:
      - access_token
      - refresh_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    UserRefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    CreateJobRequest:
      type: object
      required:
      - title
      - description
      - department
      - location
      properties:
        title:
          type: string
          maxLength: 50
        description:
          type: string
        department:
          type: string
          maxLength: 50
        location:
          type: string
          maxLength: 25
    UpdateJobRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 50
        description:
          type: string
        department:
          type: string
          maxLength: 50
        location:
          type: string
          maxLength: 25
    JobResponse:
      type: object
      required:
      - id
      - title
      - description
      - department
      - location
      - is_open
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        department:
          type: string
        location:
          type: string
        is_open:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApplicationResponse:
      type: object
      required:
      - id
      - job_id
      - user_id
      - status
      - resume
      - applied_on
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        resume:
          type: string
        applied_on:
          type: string
          format: date-time
    InviteRequest:
      type: object
      required:
      - name
      - email
      - role
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        role:
          $ref: '#/components/schemas/Role'
    CreateOrder:
      type: object
      required:
      - plan
      properties:
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
    UpdateOrder:
      type: object
      required:
      - order_id
      - payment_id
      - signature
      properties:
        order_id:
          type: string
        payment_id:
          type: string
        signature:
          type: string
    JDBuilderPrompt:
      type: object
      required:
      - prompt
      properties:
        prompt:
          type: string
        company_name:
          type: string
        tone:
          type: string
          default: professional and enthusiastic
    GeneratedJD:
      type: object
      required:
      - markdown_text
      properties:
        markdown_text:
          type: string
    Role:
      type: string
      enum:
      - employee
      - manager
      - recruiter
      - applicant
    ApplicationStatus:
      type: string
      enum:
      - pending
      - shortlisted
      - ai_interview_completed
      - human_interview_scheduled
      - human_interview_completed
      - offered
      - rejected
      - hired
      - withdrawn
    SubscriptionPlan:
      type: string
      enum:
      - 3_months
      - 6_months
      - 12_months
  responses:
    UnauthorizedError:
      description: Unauthorized - invalid/missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example1:
              value:
                code: UNAUTHORIZED
                message: Invalid token
    ForbiddenError:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example1:
              value:
                code: FORBIDDEN
                message: Insufficient permissions
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example1:
              value:
                code: NOT_FOUND
                message: Resource not found
    ConflictError:
      description: Conflict - resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example1:
              value:
                code: CONFLICT
                message: Resource already exists
    ValidationError:
      description: Validation error - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example1:
              value:
                code: VALIDATION_ERROR
                message: Invalid input
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example1:
              value:
                code: INTERNAL_ERROR
                message: Unexpected error
