        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/tenant/ai-interview:
    post:
      operationId: tenantCreateAiInterviewSession
      tags:
      - Tenant AI Interview
      summary: Create AI interview session
      description: 'User story: As a recruiter, I want to create AI interview sessions for automated screening.


        Creates new AI interview session.'
      security: []
      parameters:
      - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
