services:
  # ---------- database migrations (one-shot) ----------
  # Applies platform (public) migrations, then tenant migrations across every
  # tenant in public.clients. Runs on every `up`; a no-op once schemas are
  # current. server/celery wait for this to finish successfully.
  migrate:
    build:
      context: ./server
    command: ["sh", "scripts/migrate.sh"]
    env_file:
      - ./infra/server.env
    restart: "no"

  # ---------- backend api ----------
  server:
    build:
      context: ./server
    env_file:
      - ./infra/server.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      chromadb:
        condition: service_started
    restart: always
    healthcheck:
      # No dedicated /health route; openapi.json is a cheap, DB-free 200.
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/openapi.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    expose:
      - "8000"

  # ---------- celery worker ----------
  celery:
    build:
      context: ./server
    command: celery -A src.core.celery worker --loglevel=info --concurrency=4
    env_file:
      - ./infra/server.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always

  # ---------- frontend ----------
  client:
    build:
      context: ./client
      args:
        # NEXT_PUBLIC_* must be set at BUILD time, not runtime.
        # Interpolated from infra/client.env via `--env-file infra/client.env`.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL}
        NEXT_PUBLIC_PLATFORM_URL: ${NEXT_PUBLIC_PLATFORM_URL}
        NEXT_PUBLIC_DOMAIN_NAME: ${NEXT_PUBLIC_DOMAIN_NAME}
        NEXT_PUBLIC_GCS_BUCKET_NAME: ${NEXT_PUBLIC_GCS_BUCKET_NAME}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
    restart: always
    expose:
      - "3000"

  # ---------- vector db ----------
  chromadb:
    image: chromadb/chroma:1.5.3
    restart: always
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
      IS_PERSISTENT: "TRUE"
    volumes:
      - chroma_data:/data
    expose:
      - "8000"

  # ---------- reverse proxy + tls ----------
  caddy:
    build:
      context: ./infra/caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - ./infra/caddy.env
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client

volumes:
  chroma_data:
  caddy_data:
  caddy_config:
