services:
  # ---------- migrations (one-shot) ----------
  migrate-platform:
    build:
      context: ./server
    command: alembic -c alembic.ini upgrade head
    env_file:
      - ./infra/server.env
    restart: "no"

  migrate-tenant:
    build:
      context: ./server
    command: alembic -c alembic_tenant.ini upgrade head
    env_file:
      - ./infra/server.env
    depends_on:
      migrate-platform:
        condition: service_completed_successfully
    restart: "no"

  # ---------- backend api ----------
  server:
    build:
      context: ./server
    env_file:
      - ./infra/server.env
    depends_on:
      migrate-tenant:
        condition: service_completed_successfully
      chromadb:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    expose:
      - "8000"

  # ---------- celery worker ----------
  celery:
    build:
      context: ./server
    command: celery -A src.core.celery worker --loglevel=info --concurrency=4
    env_file:
      - ./infra/server.env
    depends_on:
      migrate-tenant:
        condition: service_completed_successfully
      chromadb:
        condition: service_healthy
    restart: always

  # ---------- frontend ----------
  client:
    build:
      context: ./client
      args:
        # NEXT_PUBLIC_* must be set at BUILD time, not runtime
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL}
        NEXT_PUBLIC_PLATFORM_URL: ${NEXT_PUBLIC_PLATFORM_URL}
        NEXT_PUBLIC_DOMAIN_NAME: ${NEXT_PUBLIC_DOMAIN_NAME}
        NEXT_PUBLIC_GCS_BUCKET_NAME: ${NEXT_PUBLIC_GCS_BUCKET_NAME}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
    env_file:
      - ./infra/client.env
    restart: always
    expose:
      - "3000"

  # ---------- vector db ----------
  chromadb:
    image: chromadb/chroma:1.5.3
    restart: always
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
      IS_PERSISTENT: "TRUE"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    expose:
      - "8000"

  # ---------- reverse proxy + tls ----------
  caddy:
    build:
      context: ./infra/caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      DOMAIN_NAME: ${DOMAIN_NAME}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client

volumes:
  chroma_data:
  caddy_data:
  caddy_config:
