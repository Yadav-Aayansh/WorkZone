          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Open
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobResponse'
                title: Response List Jobs Api Tenant Jobs Get
