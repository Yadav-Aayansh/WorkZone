components:
  schemas:
    ApplicationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        job_id:
          type: string
          format: uuid
          title: Job Id
        user_id:
          type: string
          format: uuid
          title: User Id
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        resume:
          type: string
          title: Resume
        applied_on:
          type: string
          format: date-time
          title: Applied On
      type: object
      required:
      - id
      - job_id
      - user_id
      - status
      - resume
      - applied_on
      title: ApplicationResponse
    ApplicationStatus:
      type: string
      enum:
      - pending
      - shortlisted
      - ai_interview_completed
      - human_interview_scheduled
      - human_interview_completed
      - offered
      - rejected
      - hired
      - withdrawn
      title: ApplicationStatus
    Body_apply_api_tenant_jobs__job_id__apply_post:
      properties:
        resume:
          type: string
          format: binary
          title: Resume
      type: object
      required:
      - resume
      title: Body_apply_api_tenant_jobs__job_id__apply_post
    Body_onboarding_api_platform_onboarding_post:
      properties:
        tenant_id:
          type: string
          title: Tenant Id
        brand_name:
          type: string
          title: Brand Name
        logo:
          type: string
          format: binary
          title: Logo
      type: object
      required:
      - tenant_id
      - brand_name
      - logo
      title: Body_onboarding_api_platform_onboarding_post
    ClientLoginRequest:
      properties:
        email:
          type: string
          maxLength: 255
          format: email
          title: Email
        password:
          type: string
          minLength: 8
          title: Password
      type: object
      required:
      - email
      - password
      title: ClientLoginRequest
    ClientLoginResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        refresh_token:
          type: string
          title: Refresh Token
        account_status:
          type: string
          title: Account Status
        subscription_status:
          type: string
          title: Subscription Status
      type: object
      required:
      - access_token
      - refresh_token
      - account_status
      - subscription_status
      title: ClientLoginResponse
    ClientRefreshRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
      - refresh_token
      title: ClientRefreshRequest
    ClientSignupRequest:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 3
          title: Name
        email:
          type: string
          maxLength: 255
          format: email
          title: Email
        password:
          type: string
          minLength: 8
          title: Password
      type: object
      required:
      - name
      - email
      - password
      title: ClientSignupRequest
    ClientSignupResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        refresh_token:
          type: string
          title: Refresh Token
        account_status:
          type: string
          title: Account Status
        subscription_status:
          type: string
          title: Subscription Status
      type: object
      required:
      - access_token
      - refresh_token
      - account_status
      - subscription_status
      title: ClientSignupResponse
    CreateJobRequest:
      properties:
        title:
          type: string
          maxLength: 50
          title: Title
        description:
          type: string
          title: Description
        department:
          type: string
          maxLength: 50
          title: Department
        location:
          type: string
          maxLength: 25
          title: Location
      type: object
      required:
      - title
      - description
      - department
      - location
      title: CreateJobRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InviteRequest:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 3
          title: Name
        email:
          type: string
          maxLength: 255
          format: email
          title: Email
        role:
          $ref: '#/components/schemas/Role'
      type: object
      required:
      - name
      - email
      - role
      title: InviteRequest
    JDBuilderPrompt:
      properties:
        prompt:
          type: string
          title: Prompt
          description: The user's short description of the role.
        company_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Company Name
          description: Optional company name to insert.
        tone:
          type: string
          title: Tone
          description: e.g., 'formal', 'casual', 'energetic'
          default: professional and enthusiastic
      type: object
      required:
      - prompt
      title: JDBuilderPrompt
      description: Input model for the JD generator.
    JobResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        department:
          type: string
          title: Department
        location:
          type: string
          title: Location
        is_open:
          type: boolean
          title: Is Open
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - title
      - description
      - department
      - location
      - is_open
      - created_at
      - updated_at
      title: JobResponse
    Role:
      type: string
      enum:
      - employee
      - manager
      - recruiter
      - applicant
      title: Role
    SubscriptionPlan:
      type: string
      enum:
      - 3_months
      - 6_months
      - 12_months
      title: SubscriptionPlan
    UpdateJobRequest:
      properties:
        title:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: Title
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        department:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: Department
        location:
          anyOf:
          - type: string
            maxLength: 25
          - type: 'null'
          title: Location
      type: object
      title: UpdateJobRequest
    UpdateOrder:
      properties:
        order_id:
          type: string
          title: Order Id
        payment_id:
          type: string
          title: Payment Id
        signature:
          type: string
          title: Signature
      type: object
      required:
      - order_id
      - payment_id
      - signature
      title: UpdateOrder
    UserLoginRequest:
      properties:
        email:
          type: string
          maxLength: 255
          format: email
          title: Email
        password:
          type: string
          minLength: 8
          title: Password
      type: object
      required:
      - email
      - password
      title: UserLoginRequest
    UserRefreshRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
