<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Invitation to Join</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 40px 0;
      }
      .container {
        max-width: 520px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
        padding: 36px 32px;
        text-align: center;
      }
      h2 {
        color: #222222;
        margin-bottom: 18px;
      }
      p {
        color: #555555;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      a.button {
        display: inline-block;
        background-color: #0a66c2;
        color: #ffffff !important;
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 5px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      a.button:hover {
        background-color: #084b8a;
      }
      .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #888888;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Invitation to Join Our Platform</h2>
      <p>
        You’ve been invited to join the organization’s workspace on our HR platform.
        Click the button below to accept the invitation and set up your account.
      </p>
      <a href="{{invite_link}}" class="button">Accept Invitation</a>
      <p class="footer">
        If you did not expect this invitation, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
